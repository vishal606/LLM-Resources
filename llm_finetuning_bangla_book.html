      </div>
      ${ch.content}
    </div>
  `;
  document.getElementById('progress').style.width = `${((current + 1) / chapters.length) * 100}%`;
  document.getElementById('page-info').textContent = `${current + 1} / ${chapters.length}`;
  document.getElementById('prev-btn').disabled = current === 0;
  document.getElementById('next-btn').disabled = current === chapters.length - 1;
  document.querySelectorAll('.toc-btn').forEach((b, i) => {
    b.classList.toggle('active', i === current);
  });
}

function navigate(dir) {
  current = Math.max(0, Math.min(chapters.length - 1, current + dir));

}

});
